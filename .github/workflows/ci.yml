name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  testzig0152:
    runs-on: ubuntu-latest
    container:
      image: imng/zero-kcov:0.1
      options: --security-opt seccomp=unconfined
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Zig 0.15.2 as active
        run: |
          zig version
          kcov --version
          more /etc/os-release

      - name: Run tests with coverage
        run: |
          zig build test -Dcoverage --summary all

      - name: Extract coverage
        id: coverage
        run: |
          if [ -f zig-out/kcov/test/coverage.json ]; then
            COVERAGE=$(jq -r '.percent_covered' zig-out/kcov/test/coverage.json)
            echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
            echo "Coverage for Zig 0.15.2: $COVERAGE%"
          else
            echo "coverage=0" >> $GITHUB_OUTPUT
            echo "Coverage for Zig 0.15.2: 0%"
          fi

      - name: Update README with coverage
        if: always()
        run: |
          NEW_COVERAGE=$(jq -r '.percent_covered' zig-out/kcov/test/coverage.json | cut -d. -f1)
          echo "Updating coverage to ${NEW_COVERAGE}%"
          if [ "$NEW_COVERAGE" -lt 85 ]; then
            COLOR="red"
          elif [ "$NEW_COVERAGE" -ge 95 ]; then
            COLOR="green"
          else
            COLOR="yellow"
          fi
          sed -i "s/Coverage-[0-9]*\.[0-9]*%-[a-z]*/Coverage-${NEW_COVERAGE}%-${COLOR}/; s/Coverage-[0-9]*%-[a-z]*/Coverage-${NEW_COVERAGE}%-${COLOR}/" readme.md
          git config --global user.name "im-ng"
          git config --global user.email "2039564+im-ng@users.noreply.github.com"
          git add readme.md
          git commit -m "chore: update coverage to $COVERAGE%" || echo "No changes to commit"

      - name: Push coverage update
        if: always()
        run: |
          git push

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coveragezig0152
          path: zig-out/kcov/test/coverage.json